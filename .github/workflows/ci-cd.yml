name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        flake8 data-service/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 data-service/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        flake8 frontend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 frontend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        flake8 heatmap-service/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 heatmap-service/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run tests
      run: |
        # Placeholder for tests - add actual test commands here
        echo "Running tests..."
        # pytest data-service/
        # pytest frontend/
        # pytest heatmap-service/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push data-service image
      uses: docker/build-push-action@v5
      with:
        context: ./data-service
        push: true
        tags: ghcr.io/${{ github.repository | lower }}/data-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ghcr.io/${{ github.repository | lower }}/frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push heatmap-service image
      uses: docker/build-push-action@v5
      with:
        context: ./heatmap-service
        push: true
        tags: ghcr.io/${{ github.repository | lower }}/heatmap-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test docker-compose build
      run: |
        docker-compose build